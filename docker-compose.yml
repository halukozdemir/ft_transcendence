# ============================================
# ft_transcendence - Docker Compose
# ============================================
# Usage: docker-compose up --build
# ============================================

services:

  # ========== 1. Gateway (Nginx Reverse Proxy) ==========
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ft_gateway
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:80"
      - "${GATEWAY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - user_avatars:/var/www/media:ro
    depends_on:
      - frontend
      - auth_service
      - game_service
      - chat_service
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

  # ========== 2. Frontend (React SPA) ==========
  frontend:
    image: node:20-alpine
    container_name: ft_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install --silent && npm run dev"
    networks:
      - frontend_net
    restart: unless-stopped

  # ========== 3. Auth Service (Django + DRF) ==========
  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: ft_auth
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    command: ["gunicorn", "auth_project.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "120"]
    volumes:
      - user_avatars:/app/media
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped

  # ========== 4. Game Service (Node.js + Express + Socket.io) ==========
  game_service:
    build:
      context: ./game_service
      dockerfile: Dockerfile
    container_name: ft_game
    env_file:
      - .env
    depends_on:
      redis_broker:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped

  # ========== 5. Chat Service (Django Channels + Daphne) ==========
  chat_service:
    build:
      context: ./chat_service
      dockerfile: Dockerfile
    container_name: ft_chat
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    command: ["daphne", "-b", "0.0.0.0", "-p", "8003", "chat_project.asgi:application"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped

  # ========== 6. AI Service (FastAPI + Uvicorn) ==========
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: ft_ai
    env_file:
      - .env
    networks:
      - backend_net
    restart: unless-stopped

  # ========== Databases & Infrastructure ==========

  # PostgreSQL (tek instance — auth, chat, stats DB'leri icinde)
  postgres:
    image: postgres:16-alpine
    container_name: ft_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis for Django Channels (WebSocket broker)
  redis_broker:
    image: redis:7-alpine
    container_name: ft_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

# ========== Volumes ==========
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  user_avatars:
    driver: local

# ========== Networks ==========
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
